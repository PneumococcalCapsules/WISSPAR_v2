name: Refresh data

# Pulls the latest immunogenicity export from wisspar.com, transforms it to JSON,
# and commits the snapshot if it changed. A commit to main triggers publish.yml.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest export
        run: node scripts/fetch-data.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/wisspar_export.json)" ]]; then
            git config user.name "wisspar-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/wisspar_export.json
            git commit -m "chore: refresh immunogenicity data snapshot"
            git push
          else
            echo "No data changes."
          fi
